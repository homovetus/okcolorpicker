<!doctype html>
<html domain="github.io" lang="en">
  <head>
    <title>test</title>
    <script type="module" src="main.js"></script>
    <style>
      canvas {
        image-rendering: crisp-edges;
      }
      div.colorpicker {
        position: relative;
        height: 300px;
        width: 320px;
      }
      svg.colorpicker {
        position: absolute;
        left: 0;
        pointer-events: none;
      }
      canvas.colorpicker_square {
        position: absolute;
        left: 10px;
        top: 10px;
      }
      canvas.colorpicker_slider {
        position: absolute;
        left: 287px;
        top: 10px;
      }
    </style>
  </head>

  <body>
    <section>
      <table>
        <tr>
          <td rowspan="4">
            <div id="swatch" class="swatch"></div>
            <br />
            <input type="text" id="hex_input" maxlength="7" class="hex_input" />
          </td>
          <td>
            <b>OKHSV</b>
          </td>
        </tr>
        <tr>
          <td>
            <label>H</label>
            <input
              type="number"
              id="okhsv_h_input"
              min="0"
              max="360"
              maxlength="3"
              class="value_input"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label>S</label>
            <input
              type="number"
              id="okhsv_s_input"
              min="0"
              max="100"
              maxlength="3"
              class="value_input"
            />
          </td>
        </tr>
        <tr>
          <td>
            <label>V</label>
            <input
              type="number"
              id="okhsv_v_input"
              min="0"
              max="100"
              maxlength="3"
              class="value_input"
            />
          </td>
        </tr>
      </table>
    </section>

    <div class="flex-container">
      <div class="flex-item">
        <h2 class="free">OKHSV</h2>

        <div class="colorpicker">
          <canvas
            class="colorpicker_square"
            id="okhsv_sv_canvas"
            width="257"
            height="257"
          ></canvas>

          <canvas
            class="colorpicker_slider"
            id="okhsv_h_canvas"
            width="31"
            height="257"
          ></canvas>

          <svg class="colorpicker" width="326" height="276">
            <g transform="translate(10,10)">
              <g id="okhsv_sv_manipulator" transform="translate(0,0)">
                <circle
                  cx="0"
                  cy="0"
                  r="5"
                  fill="none"
                  stroke-width="1.75"
                  stroke="#ffffff"
                ></circle>
                <circle
                  cx="0"
                  cy="0"
                  r="6"
                  fill="none"
                  stroke-width="1.25"
                  stroke="#000000"
                ></circle>
              </g>
            </g>

            <g transform="translate(287,10)">
              <g id="okhsv_hnn_manipulator" transform="translate(0,0)">
                <polygon
                  points="-8,-4 -1,0 -8,4"
                  fill="#ffffff"
                  stroke-width="0.8"
                  stroke="#000000"
                ></polygon>
                <polygon
                  points="38,-4 31,0 38,4"
                  fill="#ffffff"
                  stroke-width="0.8"
                  stroke="#000000"
                ></polygon>
              </g>
            </g>
          </svg>
        </div>
      </div>
    </div>

    <div class="slider">
      <table>
        <tr>
          <td>
            <canvas id="okhsv_h_slider" width="257" height="31"></canvas>
            <svg class="colorpicker" width="326" height="276">
              <g transform="translate(10,10)">
                <g id="okhsv_h_manipulator" transform="translate(0,0)">
                  <circle
                    cx="0"
                    cy="0"
                    r="5"
                    fill="none"
                    stroke-width="1.75"
                    stroke="#ffffff"
                  ></circle>
                  <circle
                    cx="0"
                    cy="0"
                    r="6"
                    fill="none"
                    stroke-width="1.25"
                    stroke="#000000"
                  ></circle>
                </g>
              </g>
            </svg>
          </td>
        </tr>
        <tr>
          <td>
            <canvas id="okhsv_s_slider" width="257" height="31"></canvas>
            <svg class="colorpicker" width="326" height="276">
              <g transform="translate(10,10)">
                <g id="okhsv_s_manipulator" transform="translate(0,0)">
                  <circle
                    cx="0"
                    cy="0"
                    r="5"
                    fill="none"
                    stroke-width="1.75"
                    stroke="#ffffff"
                  ></circle>
                  <circle
                    cx="0"
                    cy="0"
                    r="6"
                    fill="none"
                    stroke-width="1.25"
                    stroke="#000000"
                  ></circle>
                </g>
              </g>
            </svg>
          </td>
        </tr>
        <tr>
          <td>
            <canvas id="okhsv_v_slider" width="257" height="31"></canvas>
            <svg class="colorpicker" width="326" height="276">
              <g transform="translate(10,10)">
                <g id="okhsv_v_manipulator" transform="translate(0,0)">
                  <circle
                    cx="0"
                    cy="0"
                    r="5"
                    fill="none"
                    stroke-width="1.75"
                    stroke="#ffffff"
                  ></circle>
                  <circle
                    cx="0"
                    cy="0"
                    r="6"
                    fill="none"
                    stroke-width="1.25"
                    stroke="#000000"
                  ></circle>
                </g>
              </g>
            </svg>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
